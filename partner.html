// --- Bill modal ---
function openBillModal(billId) {
  const editing = billId ? state.bills.find(b => b.id === billId) : null;
  const sourceOptions = state.sources.map(s =>
    `<option value="${s.id}" ${editing && editing.sourceId === s.id ? 'selected' : ''}>${s.emoji} ${s.name}</option>`
  ).join('');
  const dayOptions = Array.from({length: 31}, (_, i) => i + 1).map(d =>
    `<option value="${d}" ${editing && editing.dueDay === d ? 'selected' : ''}>${d}</option>`
  ).join('');

  // Find Bills category subcategories
  const billsCat = state.categories.find(c => c.id === 'c-bills');
  const billsSubs = billsCat ? billsCat.subcategories : [];
  const subOptions = `<option value="">— None —</option>` + billsSubs.map(sub =>
    `<option value="${sub.id}" ${editing && editing.subcategoryId === sub.id ? 'selected' : ''}>${sub.emoji ? sub.emoji + ' ' : ''}${sub.name}</option>`
  ).join('');

  openModal(`
    <h3>${editing ? 'Edit bill' : 'Add bill'}</h3>
    <div class="field">
      <label class="field-label sm">Name</label>
      <div class="input-wrap sm"><input type="text" id="bill-name" value="${editing ? editing.emoji + ' ' + editing.name : ''}" placeholder="e.g. 🏠 Rent"></div>
      <div class="field-hint">Include an emoji at the start if you like</div>
    </div>
    <div class="field">
      <label class="field-label sm">Amount</label>
      <div class="input-wrap sm"><input type="text" inputmode="decimal" pattern="[0-9.,]*" id="bill-amount" value="${editing ? editing.amount : ''}" placeholder="0.00"><span class="suffix">zł</span></div>
    </div>
    <div class="field">
      <label class="field-label sm">Due day</label>
      <div class="input-wrap sm"><select class="day-select" id="bill-day">${dayOptions}</select></div>
    </div>
    <div class="field">
      <label class="field-label sm">Source</label>
      <div class="input-wrap sm"><select class="day-select" id="bill-source">${sourceOptions}</select></div>
    </div>
    <div class="field">
      <label class="field-label sm">Subcategory (under Bills)</label>
      <div class="input-wrap sm"><select class="day-select" id="bill-subcategory">${subOptions}</select></div>
      <div class="field-hint">Add subcategories under Bills in Settings → Categories</div>
    </div>
    <div class="btn-stack" style="margin-top: 16px">
      <button class="btn btn-primary" id="bill-save">${editing ? 'Save' : 'Add'}</button>
      ${editing ? '<button class="btn btn-danger" id="bill-delete">Delete</button>' : ''}
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  `);

  document.getElementById('bill-save').onclick = () => {
    const raw = document.getElementById('bill-name').value.trim();
    if (!raw) { toast('Enter a name'); return; }
    const amount = parseAmount(document.getElementById('bill-amount').value);
    if (!amount || amount <= 0) { toast('Enter an amount'); return; }
    const dueDay = parseInt(document.getElementById('bill-day').value);
    const sourceId = document.getElementById('bill-source').value;
    const subcategoryId = document.getElementById('bill-subcategory').value || null;

    // Parse emoji from start if present
    const m = raw.match(/^(\p{Extended_Pictographic}(?:\u200d\p{Extended_Pictographic})*\uFE0F?)\s*(.*)$/u);
    const emoji = m && m[1] ? m[1] : '💳';
    const name = m && m[2] ? m[2].trim() : raw;

    if (editing) {
      editing.name = name;
      editing.emoji = emoji;
      editing.amount = amount;
      editing.dueDay = dueDay;
      editing.sourceId = sourceId;
      editing.subcategoryId = subcategoryId;
    } else {
      state.bills.push({
        id: uid('b'),
        name, emoji, amount, dueDay, sourceId, subcategoryId,
        checkedCycles: {}
      });
    }
    saveState();
    closeModal();
    renderAll();
  };

  if (editing) {
    const hasHistory = state.expenses.some(e => e.billId === editing.id);
    document.getElementById('bill-delete').onclick = () => {
      const msg = hasHistory
        ? `${editing.emoji} ${editing.name} will be removed. Its logged expenses will remain but will no longer be linked to a bill.`
        : `${editing.emoji} ${editing.name} will be removed.`;
      openConfirmModal('Delete this bill?', msg, () => {
        // Unlink any expenses connected to this bill
        state.expenses.forEach(e => {
          if (e.billId === editing.id) {
            delete e.billId;
            delete e.cycleKey;
          }
        });
        state.bills = state.bills.filter(b => b.id !== editing.id);
        saveState();
        closeModal();
        renderAll();
      });
    };
  }
}

// --- Category modal ---
function openCategoryModal(catId) {
  const editing = catId ? state.categories.find(c => c.id === catId) : null;
  openModal(`
    <h3>${editing ? 'Edit category' : 'Add category'}</h3>
    <div class="field">
      <label class="field-label sm">Name (with emoji)</label>
      <div class="input-wrap sm"><input type="text" id="cat-name" value="${editing ? editing.emoji + ' ' + editing.name : ''}" placeholder="e.g. 🛒 Groceries"></div>
      <div class="field-hint">Type the emoji at the start using your keyboard</div>
    </div>
    <div class="btn-stack" style="margin-top:0">
      <button class="btn btn-primary" id="cat-save">${editing ? 'Save' : 'Add'}</button>
      ${editing ? '<button class="btn btn-danger" id="cat-delete">Delete</button>' : ''}
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  `);

  document.getElementById('cat-save').onclick = () => {
    const raw = document.getElementById('cat-name').value.trim();
    if (!raw) { toast('Enter a name'); return; }
    const m = raw.match(/^(\p{Extended_Pictographic}(?:\u200d\p{Extended_Pictographic})*\uFE0F?)\s*(.*)$/u);
    const emoji = m && m[1] ? m[1] : '✨';
    const name = m && m[2] ? m[2].trim() : raw;

    if (editing) {
      editing.name = name;
      editing.emoji = emoji;
    } else {
      state.categories.push({ id: uid('c'), name, emoji, subcategories: [] });
    }
    saveState();
    closeModal();
    renderAll();
  };

  if (editing) {
    document.getElementById('cat-delete').onclick = () => {
      const inUse = state.expenses.some(e => e.categoryId === editing.id);
      const msg = inUse
        ? `${editing.emoji} ${editing.name} is used in some expenses. They will keep their tag but won't be browsable by category.`
        : `${editing.emoji} ${editing.name} will be removed.`;
      openConfirmModal('Delete this category?', msg, () => {
        state.categories = state.categories.filter(c => c.id !== editing.id);
        saveState();
        renderAll();
      });
    };
  }
}

function openSubcategoryModal(catId, subId) {
  const cat = state.categories.find(c => c.id === catId);
  if (!cat) return;
  const editing = subId ? cat.subcategories.find(s => s.id === subId) : null;
  openModal(`
    <h3>${editing ? 'Edit subcategory' : 'Add subcategory'} in ${cat.emoji} ${cat.name}</h3>
    <div class="field">
      <label class="field-label sm">Name (with optional emoji)</label>
      <div class="input-wrap sm"><input type="text" id="sub-name" value="${editing ? (editing.emoji ? editing.emoji + ' ' : '') + editing.name : ''}" placeholder="e.g. Lidl"></div>
    </div>
    <div class="btn-stack" style="margin-top:0">
      <button class="btn btn-primary" id="sub-save">${editing ? 'Save' : 'Add'}</button>
      ${editing ? '<button class="btn btn-danger" id="sub-delete">Delete</button>' : ''}
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  `);

  document.getElementById('sub-save').onclick = () => {
    const raw = document.getElementById('sub-name').value.trim();
    if (!raw) { toast('Enter a name'); return; }
    const m = raw.match(/^(\p{Extended_Pictographic}(?:\u200d\p{Extended_Pictographic})*\uFE0F?)\s*(.*)$/u);
    const emoji = m && m[1] ? m[1] : '';
    const name = m && m[2] ? m[2].trim() : raw;

    if (editing) {
      editing.name = name;
      editing.emoji = emoji;
    } else {
      cat.subcategories.push({ id: uid('sc'), name, emoji });
    }
    saveState();
    closeModal();
    renderAll();
  };

  if (editing) {
    document.getElementById('sub-delete').onclick = () => {
      openConfirmModal('Delete this subcategory?', `${editing.emoji} ${editing.name} will be removed.`, () => {
        cat.subcategories = cat.subcategories.filter(s => s.id !== editing.id);
        saveState();
        renderAll();
      });
    };
  }
}

function openSourceModal(srcId) {
  const editing = srcId ? state.sources.find(s => s.id === srcId) : null;
  const countInBudget = editing ? (editing.countInBudget !== false) : true;
  openModal(`
    <h3>${editing ? 'Edit source' : 'Add source'}</h3>
    <div class="field">
      <label class="field-label sm">Name (with emoji)</label>
      <div class="input-wrap sm"><input type="text" id="src-name" value="${editing ? editing.emoji + ' ' + editing.name : ''}" placeholder="e.g. 🏦 PKO"></div>
    </div>
    <div class="field">
      <button class="toggle-row" id="src-count-toggle">
        <span class="toggle-label">
          <span style="font-weight:500">Count in budget</span>
          <span style="font-size:13px; color:var(--secondary); font-weight:400">Spending from this source reduces your weekly balance</span>
        </span>
        <span class="toggle ${countInBudget ? 'on' : ''}" id="src-count-visual">
          <span class="toggle-knob"></span>
        </span>
      </button>
    </div>
    <div class="btn-stack" style="margin-top:0">
      <button class="btn btn-primary" id="src-save">${editing ? 'Save' : 'Add'}</button>
      ${editing ? '<button class="btn btn-danger" id="src-delete">Delete</button>' : ''}
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  `);

  let toggleState = countInBudget;
  document.getElementById('src-count-toggle').onclick = () => {
    toggleState = !toggleState;
    document.getElementById('src-count-visual').classList.toggle('on', toggleState);
  };

  document.getElementById('src-save').onclick = () => {
    const raw = document.getElementById('src-name').value.trim();
    if (!raw) { toast('Enter a name'); return; }
    const m = raw.match(/^(\p{Extended_Pictographic}(?:\u200d\p{Extended_Pictographic})*\uFE0F?)\s*(.*)$/u);
    const emoji = m && m[1] ? m[1] : '💜';
    const name = m && m[2] ? m[2].trim() : raw;

    if (editing) {
      editing.name = name;
      editing.emoji = emoji;
      editing.countInBudget = toggleState;
    } else {
      state.sources.push({ id: uid('s'), name, emoji, countInBudget: toggleState });
    }
    saveState();
    closeModal();
    renderAll();
  };

  if (editing) {
    document.getElementById('src-delete').onclick = () => {
      const inUse = state.expenses.some(e => e.sourceId === editing.id) || state.bills.some(b => b.sourceId === editing.id);
      if (inUse) {
        toast("Can't delete — source is used");
        return;
      }
      openConfirmModal('Delete this source?', `${editing.emoji} ${editing.name} will be removed.`, () => {
        state.sources = state.sources.filter(s => s.id !== editing.id);
        saveState();
        renderAll();
      });
    };
  }
}

// ============ EXPORT / IMPORT ============

function exportData() {
  const data = {
    settings: state.settings,
    categories: state.categories,
    sources: state.sources,
    bills: state.bills,
    expenses: state.expenses,
    exportedAt: new Date().toISOString(),
    version: 1,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = todayISO();
  a.href = url;
  a.download = `budget-${today}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Exported');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      openConfirmModal(
        'Import this backup?',
        'Your current data will be replaced with the data from this file. Make sure you have a recent export if you want to keep what\'s currently in the app.',
        () => {
          if (data.settings) state.settings = { ...state.settings, ...data.settings };
          if (data.categories) state.categories = data.categories;
          if (data.sources) state.sources = data.sources;
          if (data.bills) state.bills = data.bills;
          if (data.expenses) state.expenses = data.expenses;
          saveState();
          renderAll();
          toast('Imported');
        },
        'Import'
      );
    } catch (err) {
      toast('Could not read file');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ============ TOAST ============

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ============ MASTER RENDER ============

function renderAll() {
  autoLogBills();
  if (currentScreen === 'home') renderHome();
  else if (currentScreen === 'settings') renderSettings();
  else if (currentScreen === 'bills') renderBills();
  else if (currentScreen === 'categories') renderCategories();
  else if (currentScreen === 'sources') renderSources();
  else if (currentScreen === 'expense') renderExpenseForm();
}

// ============ INIT ============

loadState();
loadPartnerState();
autoLogBills();
renderAll();
// Pull partner data on startup (silent)
pullPartnerData().then(ok => { if (ok) renderAll(); });

// Re-render at midnight for date changes
setInterval(() => {
  // Cheap: just re-render every 5 min if on home
  if (currentScreen === 'home') renderHome();
}, 5 * 60 * 1000);
</script>
