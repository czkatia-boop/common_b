  document.getElementById('home-greeting').textContent = `${dow}, ${months[today.getMonth()]} ${today.getDate()}`;

  // Hero
  const week = getCurrentWeek(today);
  document.getElementById('hero-week-range').textContent =
    `${months[week.start.getMonth()]} ${week.start.getDate()} – ${months[week.end.getMonth()]} ${week.end.getDate()}`;

  if (state.settings.monthlyIncome === 0) {
    document.getElementById('hero-amount').textContent = '0.00';
    document.getElementById('hero-balance').textContent = '0.00 zł';
  } else {
    document.getElementById('hero-amount').textContent = fmt(okToSpend(today));
    document.getElementById('hero-balance').textContent = fmt(currentBalance(today)) + ' zł';
  }

  // Segmented control
  document.querySelectorAll('[data-view]').forEach(b => {
    b.classList.toggle('active', b.dataset.view === homeView);
    b.onclick = () => {
      const newView = b.dataset.view;
      if (newView !== homeView) {
        homeView = newView;
        viewingWeekOffset = 0;
        viewingCycleOffset = 0;
        homeSourceFilter = 'all';
        weekSourceFilter = 'all';
      }
      renderHome();
    };
  });

  // Content
  const content = document.getElementById('home-content');
  if (state.expenses.length === 0) {
    content.innerHTML = `
      <div class="empty">
        <span class="em">✨</span>
        No expenses yet — tap + to add your first one
      </div>`;
    return;
  }

  if (homeView === 'day') {
    content.innerHTML = renderDayView();
  } else if (homeView === 'week') {
    // Week source filter
    let weekFilterHtml = `<div class="source-filter">
      <button data-week-filter="all" class="${weekSourceFilter === 'all' ? 'active' : ''}">All</button>
      <button data-week-filter="my" class="${weekSourceFilter === 'my' ? 'active' : ''}">Mine</button>
      <button data-week-filter="partner" class="${weekSourceFilter === 'partner' ? 'active' : ''}">Partner</button>`;
    state.sources.forEach(s => {
      weekFilterHtml += `<button data-week-filter="${s.id}" class="${weekSourceFilter === s.id ? 'active' : ''}">${s.emoji} ${s.name}</button>`;
    });
    weekFilterHtml += `</div>`;
    content.innerHTML = renderWeekView(weekFilterHtml);
    attachCategoryToggles();
    attachPeriodNav();
    attachWeekFilter();
  } else {
    // Source filter with Partner option
    let filterHtml = `<div class="source-filter">
      <button data-source-filter="all" class="${homeSourceFilter === 'all' ? 'active' : ''}">All</button>
      <button data-source-filter="my" class="${homeSourceFilter === 'my' ? 'active' : ''}">My money</button>
      <button data-source-filter="partner" class="${homeSourceFilter === 'partner' ? 'active' : ''}">Partner</button>`;
    state.sources.forEach(s => {
      filterHtml += `<button data-source-filter="${s.id}" class="${homeSourceFilter === s.id ? 'active' : ''}">${s.emoji} ${s.name}</button>`;
    });
    filterHtml += `</div>`;
    content.innerHTML = renderMonthView(filterHtml);
    attachCategoryToggles();
    attachMonthTabs();
    attachSourceFilter();
    attachPeriodNav();
  }

  attachExpenseClicks();
}

// --- Day view: group by date, descending ---
function renderDayView() {
  const exps = state.expenses;

  // Group expenses by date
  const groups = {};
  exps.forEach(e => {
    if (!groups[e.date]) groups[e.date] = [];
    groups[e.date].push(e);
  });
  // Fold in income entries so they're visible (and deletable) from the day list
  const incomeGroups = {};
  (state.income || []).forEach(inc => {
    if (!incomeGroups[inc.date]) incomeGroups[inc.date] = [];
    incomeGroups[inc.date].push(inc);
  });

  const sortedDates = Array.from(new Set([...Object.keys(groups), ...Object.keys(incomeGroups)])).sort((a, b) => b.localeCompare(a));

  if (sortedDates.length === 0) {
    return `<div class="empty"><span class="em">✨</span>No expenses to show</div>`;
  }

  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  const dows = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

  let html = '';
  sortedDates.forEach(date => {
    const d = parseISO(date);
    const dayExpenses = groups[date] || [];
    const total = dayExpenses.reduce((s, e) => s + e.amount, 0);
    html += `<div class="day-group">
      <div class="day-header">
        <span class="date">${dows[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}</span>
        <span class="total">${fmt(total)} zł</span>
      </div>
      <div class="day-entries">`;
    (incomeGroups[date] || []).forEach(inc => {
      html += renderIncomeCard(inc);
    });
    dayExpenses.forEach(e => {
      html += renderExpenseCard(e);
    });
    html += `</div></div>`;
  });
  return html;
}

function renderIncomeCard(inc) {
  const src = state.sources.find(s => s.id === inc.sourceId);
  return `<div class="expense-card income-card" data-income-id="${inc.id}">
    <div class="left">
      <div class="title">
        <span class="emoji">💵</span>
        <span class="name">Income${src ? ` <span class="secondary">→ ${src.emoji} ${src.name}</span>` : ''}</span>
      </div>
    </div>
    <div class="right">
      <div class="amount">+${fmt(inc.amount)}</div>
      <div class="amount-row-bottom">
        <span class="currency">zł</span>
      </div>
    </div>
  </div>`;
}

function deleteIncome(id) {
  openConfirmModal('Delete this income entry?', 'This cannot be undone.', () => {
    state.income = (state.income || []).filter(i => i.id !== id);
    saveState();
    renderAll();
  });
}

function renderExpenseCard(e) {
  const cat = state.categories.find(c => c.id === e.categoryId);
  const sub = cat && e.subcategoryId ? cat.subcategories.find(s => s.id === e.subcategoryId) : null;
  const src = state.sources.find(s => s.id === e.sourceId);
  const emoji = sub?.emoji || cat?.emoji || '✨';

  // Title: subcategory / category (or just category)
  let titleHtml;
  if (sub) {
    titleHtml = `<span>${sub.name}</span><span class="slash">/</span><span class="secondary">${cat.name}</span>`;
  } else {
    titleHtml = `<span>${cat?.name || 'Other'}</span>`;
  }

  // Tags row (source + impulse if pure)
  let tagsHtml = '';
  if (src) tagsHtml += `<span class="tag">${src.emoji} ${src.name}</span>`;
  if (e.intention === 'impulse' && e.impulseAmount == null) {
    tagsHtml += `<span class="tag impulse">⚡ Impulse</span>`;
  }

  // Mixed impulse: show small badge inline next to amount
  let impulseBadge = '';
  if (e.intention === 'impulse' && e.impulseAmount != null) {
    impulseBadge = `<span class="amount-impulse-badge">⚡ ${fmt(e.impulseAmount).replace(/\.00$/, '')}</span>`;
  }

  return `<div class="expense-card" data-exp-id="${e.id}">
    <div class="left">
      <div class="title">
        <span class="emoji">${emoji}</span>
        <span class="name">${titleHtml}</span>
      </div>
      <div class="tags">${tagsHtml}</div>
    </div>
    <div class="right">
      <div class="amount">${fmt(e.amount)}</div>
      <div class="amount-row-bottom">
        ${impulseBadge}
        <span class="currency">zł</span>
      </div>
    </div>
  </div>`;
}

// --- Week view: this week's totals by category, expandable ---
function renderWeekView(filterHtml) {
  const today = new Date();
  const week = getWeekWithOffset(today, viewingWeekOffset);
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

  // Gather expenses based on filter
  let weekExpenses = [];
  if (weekSourceFilter === 'partner') {
    weekExpenses = partnerState.expenses.filter(e => {
      const d = parseISO(e.date);
      return d >= week.start && d <= week.end;
    }).map(e => ({ ...e, _fromPartner: true }));
  } else if (weekSourceFilter === 'all') {
    const mine = state.expenses.filter(e => {
      const d = parseISO(e.date);
      return d >= week.start && d <= week.end;
    });
    const partner = partnerState.expenses.filter(e => {
      const d = parseISO(e.date);
      return d >= week.start && d <= week.end;
    }).map(e => ({ ...e, _fromPartner: true }));
    weekExpenses = [...mine, ...partner];
  } else if (weekSourceFilter === 'my') {
    weekExpenses = state.expenses.filter(e => {
      const d = parseISO(e.date);
      return d >= week.start && d <= week.end && sourceCountsInBudget(e.sourceId);
    });
  } else {
    weekExpenses = state.expenses.filter(e => {
      const d = parseISO(e.date);
      return d >= week.start && d <= week.end && e.sourceId === weekSourceFilter;
    });
  }

  const total = weekExpenses.reduce((s, e) => s + e.amount, 0);

  // Sync status hint
  const syncHint = partnerState.lastSyncedAt
    ? `Last synced: ${new Date(partnerState.lastSyncedAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`
    : 'Not yet synced';

  let html = `<div class="period-nav">
    <button class="chev" data-nav-week="-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
    <h3 class="h3">${months[week.start.getMonth()]} ${week.start.getDate()} – ${months[week.end.getMonth()]} ${week.end.getDate()}</h3>
    <button class="chev" data-nav-week="1" ${viewingWeekOffset >= 0 ? 'style="opacity:0.3"' : ''}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
  </div>`;

  html += filterHtml;

  html += `<div class="sync-bar">
    <span class="sync-hint">${syncHint}</span>
    <button id="sync-refresh-btn" class="sync-btn" onclick="refreshPartnerData()">⟳ Refresh</button>
  </div>`;

  html += `<div class="list-total"><span class="label">Total</span><span class="value">${fmt(total)} zł</span></div>`;

  html += renderCategoryBreakdownWithPartner(weekExpenses);
  return html;
}

// Category breakdown that handles mixed own+partner expenses (uses display categories)
function renderCategoryBreakdownWithPartner(expenses) {
  const byCat = {};
  expenses.forEach(e => {
    if (!byCat[e.categoryId]) byCat[e.categoryId] = [];
    byCat[e.categoryId].push(e);
  });

  if (Object.keys(byCat).length === 0) {
    return '<div class="empty">No expenses in this period</div>';
  }

  const sortedCatIds = Object.keys(byCat).sort((a, b) => {
    const ta = byCat[a].reduce((s, e) => s + e.amount, 0);
    const tb = byCat[b].reduce((s, e) => s + e.amount, 0);
    return tb - ta;
  });

  let html = '';
  sortedCatIds.forEach(catId => {
    const cat = getDisplayCategory(catId);
    const exps = byCat[catId];
    const total = exps.reduce((s, e) => s + e.amount, 0);
    const expanded = state.expandedCategories[catId];
    const color = categoryColor(catId);
    const partnerLabel = cat.partnerOnly ? ' <span class="partner-cat-badge">partner</span>' : '';
    html += `<div class="cat-row ${expanded ? 'expanded' : ''}" data-cat-toggle="${catId}">
      <span class="stripe" style="background:${color}"></span>
      <div class="left">
        <span class="emoji">${cat.emoji}</span>
        <span class="name">${cat.name}${partnerLabel}</span>
        <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></span>
      </div>
      <div class="amount">
        <span class="amount-val">${fmt(total)}</span>
        <span class="amount-cur">zł</span>
      </div>
    </div>`;
    if (expanded) {
      html += `<div class="cat-children show">`;
      html += renderSubcategoryRollupWithPartner(cat, exps, color);
      html += `</div>`;
    }
  });
  return html;
}

function renderSubcategoryRollupWithPartner(cat, exps, color) {
  const subBuckets = {};
  let noSubTotal = 0;
  exps.forEach(e => {
    if (e.subcategoryId) {
      if (!subBuckets[e.subcategoryId]) subBuckets[e.subcategoryId] = 0;
      subBuckets[e.subcategoryId] += e.amount;
    } else {
      noSubTotal += e.amount;
    }
  });

  const subIds = Object.keys(subBuckets).sort((a, b) => subBuckets[b] - subBuckets[a]);
  let html = '';
  subIds.forEach(subId => {
    // Look in own and partner subcategories
    const sub = cat.subcategories.find(s => s.id === subId);
    if (!sub) return;
    const total = subBuckets[subId];
    const partnerBadge = sub.partnerOnly ? ' <span class="partner-cat-badge">partner</span>' : '';
    html += `<div class="sub-row-summary">
      <span class="sub-row-name">${sub.emoji || cat.emoji} ${sub.name}${partnerBadge}</span>
      <span class="sub-row-amount">${fmt(total)} <span class="sub-row-cur">zł</span></span>
    </div>`;
  });
  if (noSubTotal > 0) {
    html += `<div class="sub-row-summary">
      <span class="sub-row-name sub-row-nosub">No subcategory</span>
      <span class="sub-row-amount">${fmt(noSubTotal)} <span class="sub-row-cur">zł</span></span>
    </div>`;
  }
  return html;
}

function renderCategoryBreakdown(expenses) {
  // Group expenses by category
  const byCat = {};
  expenses.forEach(e => {
    if (!byCat[e.categoryId]) byCat[e.categoryId] = [];
    byCat[e.categoryId].push(e);
  });

  if (Object.keys(byCat).length === 0) {
    return '<div class="empty">No expenses in this period</div>';
  }

  // Sort categories by total descending
  const sortedCatIds = Object.keys(byCat).sort((a, b) => {
    const ta = byCat[a].reduce((s, e) => s + e.amount, 0);
    const tb = byCat[b].reduce((s, e) => s + e.amount, 0);
    return tb - ta;
  });

  let html = '';
  sortedCatIds.forEach(catId => {
    const cat = state.categories.find(c => c.id === catId) || { name: 'Other', emoji: '✨', subcategories: [] };
    const exps = byCat[catId];
    const total = exps.reduce((s, e) => s + e.amount, 0);
    const expanded = state.expandedCategories[catId];
    const color = categoryColor(catId);
    html += `<div class="cat-row ${expanded ? 'expanded' : ''}" data-cat-toggle="${catId}">
      <span class="stripe" style="background:${color}"></span>
      <div class="left">
        <span class="emoji">${cat.emoji}</span>
        <span class="name">${cat.name}</span>
        <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></span>
      </div>
      <div class="amount">
        <span class="amount-val">${fmt(total)}</span>
        <span class="amount-cur">zł</span>
      </div>
    </div>`;
    if (expanded) {
      html += `<div class="cat-children show">`;
      html += renderSubcategoryRollup(cat, exps, color);
      html += `</div>`;
    }
  });
  return html;
}

// Group expenses within a category by subcategory and return summary rows.
// Un-subcategorized expenses are rolled into a "No subcategory" row.
function renderSubcategoryRollup(cat, exps, color, amountField) {
  const field = amountField || 'amount';
  const subBuckets = {};
  let noSubTotal = 0;
  exps.forEach(e => {
    if (e.subcategoryId) {
      if (!subBuckets[e.subcategoryId]) subBuckets[e.subcategoryId] = 0;
      subBuckets[e.subcategoryId] += e[field];
    } else {
      noSubTotal += e[field];
    }
  });

  const subIds = Object.keys(subBuckets).sort((a, b) => subBuckets[b] - subBuckets[a]);
  let html = '';
  subIds.forEach(subId => {
    const sub = cat.subcategories.find(s => s.id === subId);
    if (!sub) return;
    const total = subBuckets[subId];
    html += `<div class="sub-row-summary">
      <span class="sub-row-name">${sub.emoji || cat.emoji} ${sub.name}</span>
      <span class="sub-row-amount">${fmt(total)} <span class="sub-row-cur">zł</span></span>
    </div>`;
  });
  if (noSubTotal > 0) {
    html += `<div class="sub-row-summary">
      <span class="sub-row-name sub-row-nosub">No subcategory</span>
      <span class="sub-row-amount">${fmt(noSubTotal)} <span class="sub-row-cur">zł</span></span>
    </div>`;
  }
  return html;
}

// --- Month view: donut + breakdown ---
function renderMonthView(filterHtml) {
  const today = new Date();
  const cycle = getCalendarMonthWithOffset(today, viewingCycleOffset);
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

  let cycleExpenses = [];
  if (homeSourceFilter === 'partner') {
    cycleExpenses = partnerState.expenses.filter(e => {
      const d = parseISO(e.date);
      return d >= cycle.start && d <= cycle.end;
    }).map(e => ({ ...e, _fromPartner: true }));
  } else if (homeSourceFilter === 'all') {
    const mine = state.expenses.filter(e => {
      const d = parseISO(e.date);
      return d >= cycle.start && d <= cycle.end;
    });
    const partner = partnerState.expenses.filter(e => {
      const d = parseISO(e.date);
      return d >= cycle.start && d <= cycle.end;
    }).map(e => ({ ...e, _fromPartner: true }));
    cycleExpenses = [...mine, ...partner];
  } else if (homeSourceFilter === 'my') {
    cycleExpenses = state.expenses.filter(e => {
      const d = parseISO(e.date);
      return d >= cycle.start && d <= cycle.end && sourceCountsInBudget(e.sourceId);
    });
  } else {
    cycleExpenses = state.expenses.filter(e => {
      const d = parseISO(e.date);
      return d >= cycle.start && d <= cycle.end && e.sourceId === homeSourceFilter;
    });
  }

  // For impulse tab, filter to impulsive only & compute impulse amounts
  const impulseExpenses = cycleExpenses
    .filter(e => e.intention === 'impulse')
    .map(e => ({ ...e, displayAmount: e.impulseAmount ?? e.amount }));

  const displayExpenses = monthTab === 'impulse' ? impulseExpenses : cycleExpenses.map(e => ({ ...e, displayAmount: e.amount }));
  const total = displayExpenses.reduce((s, e) => s + e.displayAmount, 0);

  let html = `<div class="period-nav">
    <button class="chev" data-nav-cycle="-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
    <h3 class="h3">${months[cycle.start.getMonth()]} ${cycle.start.getFullYear()}</h3>
    <button class="chev" data-nav-cycle="1" ${viewingCycleOffset >= 0 ? 'style="opacity:0.3"' : ''}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
  </div>`;

  // Tabs
  html += `<div class="tabs">
    <button data-month-tab="general" class="${monthTab === 'general' ? 'active' : ''}">General</button>
    <button data-month-tab="impulse" class="${monthTab === 'impulse' ? 'active' : ''}">⚡ Impulse</button>
  </div>`;

  // Source filter (passed in)
  html += filterHtml;

  // Impulse progress bar (only on impulse tab)
  if (monthTab === 'impulse') {
    const impulseSpent = impulseExpenses.reduce((s, e) => s + e.displayAmount, 0);
    const target = state.settings.impulseBudget || 0;
    const pct = target > 0 ? Math.min(100, (impulseSpent / target) * 100) : 0;
    html += `<div class="impulse-progress">
      <div class="row">
        <span class="label">Impulse budget this month</span>
        <span class="value">${fmt(impulseSpent)} / ${fmt(target)} zł</span>
      </div>
      <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
    </div>`;
  }

  // Donut chart
  html += renderDonut(displayExpenses, total);

  // Category breakdown
  html += renderCategoryBreakdownForMonth(displayExpenses);

  return html;
}

function renderDonut(expenses, total) {
  if (total === 0) {
    return `<div class="donut-wrap">
      <svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(35, 32, 27,0.15)" stroke-width="12"/>
      </svg>
      <div class="donut-center">
        <div class="num">0.00</div>
        <div class="cur">zł</div>
      </div>
    </div>`;
  }

  // Group by category
  const byCat = {};
  expenses.forEach(e => {
    if (!byCat[e.categoryId]) byCat[e.categoryId] = 0;
    byCat[e.categoryId] += e.displayAmount;
  });

  let offset = 0;
  let segments = '';
  const sortedIds = Object.keys(byCat).sort((a, b) => byCat[b] - byCat[a]);
  sortedIds.forEach((catId) => {
    const amount = byCat[catId];
    const pct = amount / total;
    const dash = pct * 251.327;
    const color = categoryColor(catId);
    segments += `<circle cx="50" cy="50" r="40" fill="none" stroke="${color}" stroke-width="12" stroke-dasharray="${dash} ${251.327 - dash}" stroke-dashoffset="${-offset}"/>`;
    offset += dash;
  });

  return `<div class="donut-wrap">
    <svg viewBox="0 0 100 100">${segments}</svg>
    <div class="donut-center">
      <div class="num">${fmt(total)}</div>
      <div class="cur">zł</div>
    </div>
  </div>`;
}

function renderCategoryBreakdownForMonth(expenses) {
  const byCat = {};
  expenses.forEach(e => {
    if (!byCat[e.categoryId]) byCat[e.categoryId] = [];
    byCat[e.categoryId].push(e);
  });

  if (Object.keys(byCat).length === 0) {
    return '<div class="empty">No expenses to show</div>';
  }

  const sortedCatIds = Object.keys(byCat).sort((a, b) => {
    const ta = byCat[a].reduce((s, e) => s + e.displayAmount, 0);
    const tb = byCat[b].reduce((s, e) => s + e.displayAmount, 0);
    return tb - ta;
  });

  let html = '';
  sortedCatIds.forEach(catId => {
    const cat = getDisplayCategory(catId);
    const exps = byCat[catId];
    const total = exps.reduce((s, e) => s + e.displayAmount, 0);
    const expanded = state.expandedCategories[catId];
    const color = categoryColor(catId);
    const partnerLabel = cat.partnerOnly ? ' <span class="partner-cat-badge">partner</span>' : '';
    html += `<div class="cat-row ${expanded ? 'expanded' : ''}" data-cat-toggle="${catId}">
      <span class="stripe" style="background:${color}"></span>
      <div class="left">
        <span class="emoji">${cat.emoji}</span>
        <span class="name">${cat.name}${partnerLabel}</span>
        <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></span>
      </div>
      <div class="amount">
        <span class="amount-val">${fmt(total)}</span>
        <span class="amount-cur">zł</span>
      </div>
    </div>`;
    if (expanded) {
      html += `<div class="cat-children show">`;
      html += renderSubcategoryRollupWithPartner(cat, exps.map(e => ({...e, amount: e.displayAmount})), color);
      html += `</div>`;
    }
  });
  return html;
}

// ============ EVENT ATTACHMENTS ============

function attachExpenseClicks() {
  document.querySelectorAll('[data-exp-id]').forEach(el => {
    el.onclick = () => openEditExpense(el.dataset.expId);

function renderSettings() {
  document.getElementById('setting-income').value = state.settings.monthlyIncome || '';
  document.getElementById('setting-cycle-day').value = state.settings.cycleStartDay;
  document.getElementById('setting-weekly').value = state.settings.weeklyBudgetOverride ?? '';
  document.getElementById('setting-impulse').value = state.settings.impulseBudget || '';

  // Weekly suggestion
  const suggested = suggestedWeeklyBudget();
  document.getElementById('weekly-suggestion').textContent = state.settings.monthlyIncome > 0
    ? `Suggested: ${fmt(suggested)} zł (income minus bills ÷ weeks in cycle)`
    : 'Enter monthly income to see suggestion';

  // Bills total
  document.getElementById('bills-total').textContent = `Total: ${fmt(totalAllBills())} zł/month`;

  // Bills list (with checkboxes for the current cycle)
  const today = new Date();
  const cycle = getCurrentCycle(today);
  const ckey = cycleKey(cycle);
  const billsEl = document.getElementById('settings-bills-list');
  billsEl.innerHTML = '';
  if (state.bills.length === 0) {
    billsEl.innerHTML = '<div class="empty" style="padding:20px">No bills yet</div>';
  } else {
    const sortedBills = [...state.bills].sort((a, b) => a.dueDay - b.dueDay);
    sortedBills.forEach(bill => {
      const checked = !!(bill.checkedCycles[ckey] && bill.checkedCycles[ckey].checked);
      const src = state.sources.find(s => s.id === bill.sourceId);
      const card = document.createElement('div');
      card.className = 'selection-card' + (checked ? ' checked' : '');
      card.innerHTML = `
        <button class="checkbox ${checked ? 'checked' : ''}" data-bill-toggle="${bill.id}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5L20 7"/></svg>
        </button>
        <div class="info">
          <div class="top">
            <div>
              <div class="name">${bill.emoji} ${bill.name}</div>
              <div class="meta">Day ${bill.dueDay} of month${src ? ' · ' + src.emoji + ' ' + src.name : ''}</div>
            </div>
            <div class="amount">
              ${fmt(bill.amount)}
              <div class="amount-cur">zł</div>
            </div>
          </div>
        </div>`;
      billsEl.appendChild(card);
    });
    billsEl.querySelectorAll('[data-bill-toggle]').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        toggleBill(el.dataset.billToggle);
      };
    });
  }
}

function saveSettings() {
  const income = parseAmount(document.getElementById('setting-income').value) || 0;
  const cycleDay = parseInt(document.getElementById('setting-cycle-day').value) || 10;
  const weeklyVal = document.getElementById('setting-weekly').value.trim();
  const weekly = weeklyVal === '' ? null : parseAmount(weeklyVal);
  const impulse = parseAmount(document.getElementById('setting-impulse').value) || 0;

  state.settings.monthlyIncome = income;
  state.settings.cycleStartDay = cycleDay;
  state.settings.weeklyBudgetOverride = weekly;
  state.settings.impulseBudget = impulse;
  saveState();
  renderSettings();
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('show');

function openConfirmModal(title, body, onConfirm, actionLabel) {
  const label = actionLabel || 'Delete';
  openModal(`

// --- Bill modal ---
function openBillModal(billId) {
  const editing = billId ? state.bills.find(b => b.id === billId) : null;
  const sourceOptions = state.sources.map(s =>
    `<option value="${s.id}" ${editing && editing.sourceId === s.id ? 'selected' : ''}>${s.emoji} ${s.name}</option>`
  ).join('');
  const dayOptions = Array.from({length: 31}, (_, i) => i + 1).map(d =>
    `<option value="${d}" ${editing && editing.dueDay === d ? 'selected' : ''}>${d}</option>`
  ).join('');

  // Find Bills category subcategories
  const billsCat = state.categories.find(c => c.id === 'c-bills');
  const billsSubs = billsCat ? billsCat.subcategories : [];
  const subOptions = `<option value="">— None —</option>` + billsSubs.map(sub =>
    `<option value="${sub.id}" ${editing && editing.subcategoryId === sub.id ? 'selected' : ''}>${sub.emoji ? sub.emoji + ' ' : ''}${sub.name}</option>`
  ).join('');

  openModal(`
    <h3>${editing ? 'Edit bill' : 'Add bill'}</h3>
    <div class="field">
      <label class="field-label sm">Name</label>
      <div class="input-wrap sm"><input type="text" id="bill-name" value="${editing ? editing.emoji + ' ' + editing.name : ''}" placeholder="e.g. 🏠 Rent"></div>
      <div class="field-hint">Include an emoji at the start if you like</div>
    </div>
    <div class="field">
      <label class="field-label sm">Amount</label>
      <div class="input-wrap sm"><input type="text" inputmode="decimal" pattern="[0-9.,]*" id="bill-amount" value="${editing ? editing.amount : ''}" placeholder="0.00"><span class="suffix">zł</span></div>
    </div>
    <div class="field">
      <label class="field-label sm">Due day</label>
      <div class="input-wrap sm"><select class="day-select" id="bill-day">${dayOptions}</select></div>
    </div>
    <div class="field">
      <label class="field-label sm">Source</label>
      <div class="input-wrap sm"><select class="day-select" id="bill-source">${sourceOptions}</select></div>
    </div>
    <div class="field">
      <label class="field-label sm">Subcategory (under Bills)</label>
      <div class="input-wrap sm"><select class="day-select" id="bill-subcategory">${subOptions}</select></div>
      <div class="field-hint">Add subcategories under Bills in Settings → Categories</div>
    </div>
    <div class="btn-stack" style="margin-top: 16px">
      <button class="btn btn-primary" id="bill-save">${editing ? 'Save' : 'Add'}</button>
      ${editing ? '<button class="btn btn-danger" id="bill-delete">Delete</button>' : ''}
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  `);

  document.getElementById('bill-save').onclick = () => {
    const raw = document.getElementById('bill-name').value.trim();
    if (!raw) { toast('Enter a name'); return; }
    const amount = parseAmount(document.getElementById('bill-amount').value);
    if (!amount || amount <= 0) { toast('Enter an amount'); return; }
    const dueDay = parseInt(document.getElementById('bill-day').value);
    const sourceId = document.getElementById('bill-source').value;
    const subcategoryId = document.getElementById('bill-subcategory').value || null;

    // Parse emoji from start if present
    const m = raw.match(/^(\p{Extended_Pictographic}(?:\u200d\p{Extended_Pictographic})*\uFE0F?)\s*(.*)$/u);
    const emoji = m && m[1] ? m[1] : '💳';
    const name = m && m[2] ? m[2].trim() : raw;

    if (editing) {
      editing.name = name;
      editing.emoji = emoji;
      editing.amount = amount;
      editing.dueDay = dueDay;
      editing.sourceId = sourceId;
      editing.subcategoryId = subcategoryId;
    } else {
      state.bills.push({
        id: uid('b'),
        name, emoji, amount, dueDay, sourceId, subcategoryId,
        checkedCycles: {}
      });
    }
    saveState();
    closeModal();
    renderAll();
  };

  if (editing) {
    const hasHistory = state.expenses.some(e => e.billId === editing.id);
    document.getElementById('bill-delete').onclick = () => {
      const msg = hasHistory
        ? `${editing.emoji} ${editing.name} will be removed. Its logged expenses will remain but will no longer be linked to a bill.`
        : `${editing.emoji} ${editing.name} will be removed.`;
      openConfirmModal('Delete this bill?', msg, () => {
        // Unlink any expenses connected to this bill
        state.expenses.forEach(e => {
          if (e.billId === editing.id) {
            delete e.billId;
            delete e.cycleKey;
          }
        });
        state.bills = state.bills.filter(b => b.id !== editing.id);
        saveState();
        closeModal();
        renderAll();
      });
    };
  }
}

// ============ EXPORT / IMPORT ============

function exportData() {
  const data = {
    settings: state.settings,
    categories: state.categories,
    sources: state.sources,
    bills: state.bills,
    expenses: state.expenses,
    exportedAt: new Date().toISOString(),
    version: 1,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = todayISO();
  a.href = url;
  a.download = `budget-${today}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Exported');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      openConfirmModal(
        'Import this backup?',
        'Your current data will be replaced with the data from this file. Make sure you have a recent export if you want to keep what\'s currently in the app.',
        () => {
          if (data.settings) state.settings = { ...state.settings, ...data.settings };
          if (data.categories) state.categories = data.categories;
          if (data.sources) state.sources = data.sources;
          if (data.bills) state.bills = data.bills;
          if (data.expenses) state.expenses = data.expenses;
          saveState();
          renderAll();
          toast('Imported');
        },
        'Import'
      );
    } catch (err) {
      toast('Could not read file');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ============ TOAST ============

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ============ MASTER RENDER ============

function renderAll() {
  autoLogBills();
  if (currentScreen === 'home') renderHome();
  else if (currentScreen === 'settings') renderSettings();
  else if (currentScreen === 'bills') renderBills();
  else if (currentScreen === 'categories') renderCategories();
  else if (currentScreen === 'sources') renderSources();
  else if (currentScreen === 'expense') renderExpenseForm();
}

// ============ INIT ============

loadState();
loadPartnerState();
autoLogBills();
renderAll();
// Pull partner data on startup (silent)
pullPartnerData().then(ok => { if (ok) renderAll(); });

// Re-render at midnight for date changes
setInterval(() => {
  // Cheap: just re-render every 5 min if on home
  if (currentScreen === 'home') renderHome();
}, 5 * 60 * 1000);
</script>
</body>
</html>
